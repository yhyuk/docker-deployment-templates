version: '3.8'

services:
  react-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: react-dev
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=${API_URL:-http://localhost:8080}
      - CHOKIDAR_USEPOLLING=true  # Hot reload를 위한 설정
    volumes:
      - .:/app
      - /app/node_modules  # node_modules는 컨테이너 것 사용
    networks:
      - app-network
    stdin_open: true
    tty: true

networks:
  app-network:
    driver: bridge
